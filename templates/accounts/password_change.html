{% extends 'base.html' %}
{% block title %}修改密码 - {{ product_name }}{% endblock %}
{% block page_header %}<header class="page-title"><h1>修改密码</h1><p>首次登录或密码被重置后，需要先设置新密码</p></header>{% endblock %}
{% block content %}
<section class="panel form-panel">
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="actions-row"><button class="btn btn-primary" type="submit">保存新密码</button></div>
  </form>
</section>
{% endblock %}
