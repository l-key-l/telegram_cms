{% extends 'base.html' %}
{% block title %}{{ title }} - {{ product_name }}{% endblock %}
{% block page_header %}<header class="page-title"><h1>{{ title }}</h1><p>{{ subtitle }}</p></header>{% endblock %}
{% block content %}<section class="panel form-panel"><form method="post" enctype="multipart/form-data" class="styled-form">{% csrf_token %}{{ form.as_p }}<div class="form-actions"><a class="btn btn-light" href="{% url 'master-telegram' %}">返回</a><button class="btn btn-success" type="submit">保存</button></div></form></section>{% endblock %}
